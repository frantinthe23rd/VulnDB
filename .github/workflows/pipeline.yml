name: Build & Deploy Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'pipeline.py'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          S3_BUCKET: test-bucket
        run: pytest tests/ -v --tb=short

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Create or update Lambda function
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
        run: |
          if aws lambda get-function --function-name ${{ vars.LAMBDA_FUNCTION }} --region ${{ vars.AWS_REGION }} > /dev/null 2>&1; then
            echo "Updating existing Lambda..."
            aws lambda update-function-code \
              --function-name ${{ vars.LAMBDA_FUNCTION }} \
              --image-uri $IMAGE_URI \
              --region ${{ vars.AWS_REGION }}
          else
            echo "Creating Lambda for the first time..."
            aws lambda create-function \
              --function-name ${{ vars.LAMBDA_FUNCTION }} \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role ${{ secrets.LAMBDA_ROLE_ARN }} \
              --timeout 900 \
              --memory-size 3008 \
              --environment "Variables={S3_BUCKET=${{ vars.S3_BUCKET }},CLOUDFRONT_DISTRIBUTION_ID=${{ secrets.VULNDB_CF_DISTRIBUTION_ID }}}" \
              --region ${{ vars.AWS_REGION }}
          fi
