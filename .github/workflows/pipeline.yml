name: Build & Deploy Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'pipeline.py'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: vulndb-pipeline
  LAMBDA_FUNCTION: vulndb-pipeline
  LAMBDA_ROLE: arn:aws:iam::REDACTED:role/vulndb-pipeline-role

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Create or update Lambda function
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
        run: |
          if aws lambda get-function --function-name $LAMBDA_FUNCTION --region $AWS_REGION > /dev/null 2>&1; then
            echo "Updating existing Lambda..."
            aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION \
              --image-uri $IMAGE_URI \
              --region $AWS_REGION
          else
            echo "Creating Lambda for the first time..."
            aws lambda create-function \
              --function-name $LAMBDA_FUNCTION \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role $LAMBDA_ROLE \
              --timeout 900 \
              --memory-size 3008 \
              --environment "Variables={S3_BUCKET=vulndb-dashboard,CLOUDFRONT_DISTRIBUTION_ID=${{ secrets.VULNDB_CF_DISTRIBUTION_ID }}}" \
              --region $AWS_REGION
          fi
